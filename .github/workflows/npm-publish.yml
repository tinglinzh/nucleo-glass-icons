name: Node.js Package

on:
  push:
    branches: [main]
    paths:
      - package.json
  workflow_dispatch:

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      # required for `git push` of the release tag
      contents: write
      # required so pnpm 11+ can mint an OIDC token for npm trusted publishing
      # (also silences the "ERR_PNPM_ID_TOKEN_GITHUB_WORKFLOW_INCORRECT_PERMISSIONS"
      # warning even if you stay on classic-token auth)
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Check whether version is new
        id: check-version
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")

          echo "Package: $PKG_NAME@$PKG_VERSION"

          if npm view "$PKG_NAME@$PKG_VERSION" version > /dev/null 2>&1; then
            echo "Version $PKG_VERSION already published on npm. Skipping."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version $PKG_VERSION not published yet. Proceeding."
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.check-version.outputs.publish == 'true'
        # --ignore-scripts: esbuild's binary download and simple-git-hooks's
        # git-hook installation are both useless in a publish CI job.
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build project
        if: steps.check-version.outputs.publish == 'true'
        run: pnpm run build

      - name: Verify npm auth
        if: steps.check-version.outputs.publish == 'true'
        # Fails fast with a clear message if NPM_TOKEN is missing or invalid,
        # instead of getting an opaque 404 from `pnpm publish` later.
        run: |
          if ! npm whoami; then
            echo "::error::npm whoami failed — NPM_TOKEN secret is missing, invalid, expired, or read-only."
            echo "::error::Create a token at https://www.npmjs.com/settings/<user>/tokens with type 'Automation' or 'Publish' and store it as the repo secret NPM_TOKEN."
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to NPM
        if: steps.check-version.outputs.publish == 'true'
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag release
        if: steps.check-version.outputs.publish == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.check-version.outputs.version }}"
          git push origin "v${{ steps.check-version.outputs.version }}"
